<!DOCTYPE html>
<html>
  <head>
    <title>GitHub Webhook Events</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="container">
      <h1>GitHub Webhook Events</h1>
      <ul id="events"></ul>
    </div>
    
    <script>
      /**
       * Get ordinal suffix for a given day number
       * @param {number} day - Day of the month (1-31)
       * @returns {string} Ordinal suffix ('st', 'nd', 'rd', 'th')
       */
      function getOrdinalSuffix(day) {
        if (day >= 10 && day <= 20) {
          return 'th';
        }
        switch (day % 10) {
          case 1: return 'st';
          case 2: return 'nd';
          case 3: return 'rd';
          default: return 'th';
        }
      }
      
      /**
       * Format ISO timestamp to human-readable format
       * @param {string} isoString - ISO 8601 timestamp string
       * @returns {string} Human-readable timestamp in format "1st April 2021 - 9:30 PM UTC"
       */
      function formatTimestamp(isoString) {
        try {
          const date = new Date(isoString);
          
          // Get day with ordinal suffix
          const day = date.getUTCDate();
          const suffix = getOrdinalSuffix(day);
          
          // Format month and year
          const monthFormatter = new Intl.DateTimeFormat('en-US', {
            month: 'long',
            timeZone: 'UTC'
          });
          const month = monthFormatter.format(date);
          const year = date.getUTCFullYear();
          
          // Format time
          const timeFormatter = new Intl.DateTimeFormat('en-US', {
            hour: 'numeric',
            minute: '2-digit',
            hour12: true,
            timeZone: 'UTC'
          });
          const time = timeFormatter.format(date);
          
          return `${day}${suffix} ${month} ${year} - ${time} UTC`;
        } catch (error) {
          console.error('Failed to format timestamp:', error);
          return isoString; // Return original if formatting fails
        }
      }
      
      /**
       * Get badge class for action type
       * @param {string} action - Action type
       * @returns {string} CSS class for badge
       */
      function getBadgeClass(action) {
        switch (action) {
          case "PUSH":
            return "push";
          case "PULL_REQUEST":
            return "pull-request";
          case "MERGE":
            return "merge";
          default:
            return "default";
        }
      }
      
      /**
       * Format event HTML with badge and structured content
       * @param {Object} event - Event object
       * @returns {string} HTML string for event
       */
      function formatEventHTML(event) {
        // Use server-provided timestamp_human if available, otherwise format client-side
        const timestamp = event.timestamp_human || formatTimestamp(event.timestamp);
        const badgeClass = getBadgeClass(event.action);
        
        let message = "";
        switch (event.action) {
          case "PUSH":
            message = `<span class="event-author">${event.author}</span> pushed to <span class="event-branch">${event.to_branch}</span>`;
            break;
          case "PULL_REQUEST":
            message = `<span class="event-author">${event.author}</span> submitted a pull request from <span class="event-branch">${event.from_branch}</span> to <span class="event-branch">${event.to_branch}</span>`;
            break;
          case "MERGE":
            message = `<span class="event-author">${event.author}</span> merged branch <span class="event-branch">${event.from_branch}</span> to <span class="event-branch">${event.to_branch}</span>`;
            break;
          default:
            message = `Unknown action: ${event.action}`;
        }
        
        return `
          <span class="action-badge ${badgeClass}">${event.action.toLowerCase()}</span>
          <div class="event-message">
            ${message}
            <div class="event-timestamp">${timestamp}</div>
          </div>
        `;
      }
      
      /**
       * Fetch and display events
       */
      function fetchEvents() {
        fetch("/events")
          .then((response) => response.json())
          .then((data) => {
            let html = "";
            data.forEach((event) => {
              const eventHTML = formatEventHTML(event);
              html += `<li>${eventHTML}</li>`;
            });
            document.getElementById("events").innerHTML = html;
          })
          .catch((error) => {
            console.error('Error fetching events:', error);
            document.getElementById("events").innerHTML = '<li class="error">Error loading events</li>';
          });
      }
      
      // Initialize
      setInterval(fetchEvents, 15000);
      window.onload = fetchEvents;
    </script>
    </div>
  </body>
</html>
