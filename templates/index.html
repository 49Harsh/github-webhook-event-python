<!DOCTYPE html>
<html>
  <head>
    <title>GitHub Webhook Events</title>
    <script>
      function fetchEvents() {
        fetch("/events")
          .then((response) => response.json())
          .then((data) => {
            let html = "";
            data.forEach((event) => {
              if (event.action === "PUSH") {
                html += `<li>${event.author} pushed to ${event.to_branch} on ${event.timestamp}</li>`;
              } else if (event.action === "PULL_REQUEST") {
                html += `<li>${event.author} submitted a pull request from ${event.from_branch} to ${event.to_branch} on ${event.timestamp}</li>`;
              } else if (event.action === "MERGE") {
                html += `<li>${event.author} merged branch ${event.from_branch} to ${event.to_branch} on ${event.timestamp}</li>`;
              }
            });
            document.getElementById("events").innerHTML = html;
          });
      }
      setInterval(fetchEvents, 15000);
      window.onload = fetchEvents;
    </script>
  </head>
  <body>
    <h1>GitHub Webhook Events</h1>
    <ul id="events"></ul>
  </body>
</html>
